<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>📰 ニュースアーカイブ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#2563EB', light: '#EFF6FF', border: '#BFDBFE' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .feed-card { transition: box-shadow .15s; }
    .feed-card:hover { box-shadow: 0 4px 16px rgba(37,99,235,.08); }
    .tag { display: inline-block; font-size: .65rem; font-weight: 700;
           padding: .15rem .55rem; border-radius: 999px; }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] .chevron { transform: rotate(180deg); }
    .chevron { transition: transform .2s; }
    #toast { transition: opacity .3s; }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen">

  <!-- ヘッダー -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2">
        <span class="text-xl">📰</span>
        <h1 class="text-base font-black text-slate-800">ニュースアーカイブ</h1>
      </div>
      <div class="flex items-center gap-2">
        <select id="feedFilter"
          class="text-xs border border-slate-200 rounded-lg px-2 py-1.5 bg-white text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary">
          <option value="">すべてのカテゴリ</option>
        </select>
        <span id="countBadge" class="text-xs bg-primary-light text-primary font-bold px-2.5 py-1 rounded-full hidden"></span>
      </div>
    </div>
  </header>

  <!-- メイン -->
  <main class="max-w-3xl mx-auto px-4 py-6 space-y-4" id="main">
    <div class="text-center py-16 text-slate-400 text-sm" id="loading">読み込み中…</div>
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white text-xs px-4 py-2 rounded-xl shadow-lg opacity-0 pointer-events-none"></div>

<script>
const DATA_URL = 'data/news.json';

// ─── カテゴリ別カラー ─────────────────────────────
const CATEGORY_COLORS = {
  'ITmedia':          { bg: 'bg-orange-100', text: 'text-orange-700' },
  '東北地方のニュース': { bg: 'bg-green-100',  text: 'text-green-700'  },
  '宮城県のニュース':  { bg: 'bg-teal-100',   text: 'text-teal-700'   },
  '仙台市のニュース':  { bg: 'bg-sky-100',    text: 'text-sky-700'    },
  '名取市のニュース':  { bg: 'bg-violet-100', text: 'text-violet-700' },
  'X(Twitter) 日本トレンド': { bg: 'bg-slate-100', text: 'text-slate-700' },
};
function catColor(name) {
  return CATEGORY_COLORS[name] || { bg: 'bg-blue-100', text: 'text-blue-700' };
}

// ─── 日時フォーマット ─────────────────────────────
function fmtTs(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  const ymd = `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
  const hm  = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  return { ymd, hm, full: `${ymd} ${hm}` };
}

// ─── アコーディオンカード生成 ─────────────────────
function buildCard(entry, idx) {
  const { ymd, hm } = fmtTs(entry.ts);
  const isLatest = idx === 0;

  const sections = entry.feeds.map(feed => {
    const c = catColor(feed.name);
    const items = (feed.items || []).map((item, i) => {
      const link = item.link
        ? `<a href="${item.link}" target="_blank" rel="noopener"
             class="text-primary hover:underline break-all">${item.title}</a>`
        : `<span>${item.title}</span>`;
      return `<li class="flex gap-2 text-[13px] leading-snug py-1 border-b border-slate-50 last:border-0">
        <span class="text-slate-300 font-bold shrink-0 mt-0.5">${i+1}.</span>
        <span>${link}</span>
      </li>`;
    }).join('');

    return `<div class="mb-4 last:mb-0">
      <div class="flex items-center gap-2 mb-1.5">
        <span class="tag ${c.bg} ${c.text}">${feed.name}</span>
        <span class="text-[11px] text-slate-400">${feed.items?.length || 0}件</span>
      </div>
      <ul class="pl-1">${items || '<li class="text-[12px] text-slate-400 py-1">記事なし</li>'}</ul>
    </div>`;
  }).join('');

  const latestBadge = isLatest
    ? '<span class="tag bg-primary text-white ml-2">最新</span>' : '';

  return `
  <details class="feed-card bg-white rounded-2xl border border-slate-200 overflow-hidden"
           ${isLatest ? 'open' : ''}>
    <summary class="flex items-center justify-between px-5 py-4 select-none">
      <div class="flex items-center gap-3 flex-wrap">
        <span class="text-[11px] font-bold text-slate-400">${ymd}</span>
        <span class="text-base font-black text-slate-800">${hm}</span>
        ${latestBadge}
      </div>
      <svg class="chevron w-4 h-4 text-slate-400 shrink-0"
           fill="none" stroke="currentColor" stroke-width="2.5"
           viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
    </summary>
    <div class="px-5 pb-5 pt-1 border-t border-slate-100">${sections}</div>
  </details>`;
}

// ─── フィルタリング ───────────────────────────────
let allData = [];
let activeFilter = '';

function render(data) {
  const main = document.getElementById('main');
  const badge = document.getElementById('countBadge');

  const filtered = activeFilter
    ? data.filter(e => e.feeds.some(f => f.name === activeFilter))
    : data;

  const reversed = [...filtered].reverse();

  if (!reversed.length) {
    main.innerHTML = '<div class="text-center py-16 text-slate-400 text-sm">該当する記事がありません</div>';
    badge.classList.add('hidden');
    return;
  }

  // 日付でグループ化
  const groups = {};
  reversed.forEach((entry, idx) => {
    const { ymd } = fmtTs(entry.ts);
    if (!groups[ymd]) groups[ymd] = [];
    groups[ymd].push({ entry, idx });
  });

  let html = '';
  for (const [ymd, entries] of Object.entries(groups)) {
    html += `<div class="text-xs font-bold text-slate-400 mt-6 mb-2 px-1">${ymd}</div>`;
    html += entries.map(({ entry, idx }) => buildCard(entry, idx)).join('');
  }

  main.innerHTML = html;
  badge.textContent = `${reversed.length}件`;
  badge.classList.remove('hidden');
}

// ─── フィルタ選択肢の生成 ─────────────────────────
function buildFilter(data) {
  const names = [...new Set(data.flatMap(e => e.feeds.map(f => f.name)))];
  const sel = document.getElementById('feedFilter');
  names.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    activeFilter = sel.value;
    render(allData);
  });
}

// ─── Toast ───────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

// ─── データ取得 ───────────────────────────────────
fetch(DATA_URL + '?t=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error('データが見つかりません');
    return r.json();
  })
  .then(data => {
    allData = data;
    buildFilter(data);
    render(data);
    const latest = [...data].reverse()[0];
    if (latest) showToast(`最終更新: ${fmtTs(latest.ts).full}`);
  })
  .catch(err => {
    document.getElementById('main').innerHTML = `
      <div class="text-center py-16 space-y-2">
        <div class="text-3xl">📭</div>
        <div class="text-slate-500 text-sm">まだデータがありません</div>
        <div class="text-slate-400 text-xs">${err.message}</div>
      </div>`;
  });
</script>
</body>
</html>
