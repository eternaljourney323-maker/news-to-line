name: LINE ニュース通知

on:
  schedule:
    # GitHub Actions の cron は UTC 基準。JST = UTC+9
    # 遅延を考慮して40分前倒しでスケジュール（目標時刻 = cron時刻 + 約40分）
    - cron: '20 19 * * *'  #  4:20 JST → 目標  5:00 JST
    - cron: '20 20 * * *'  #  5:20 JST → 目標  6:00 JST
    - cron: '20 21 * * *'  #  6:20 JST → 目標  7:00 JST
    - cron: '20  2 * * *'  # 11:20 JST → 目標 12:00 JST
    - cron: '20  5 * * *'  # 14:20 JST → 目標 15:00 JST
    - cron: '20  7 * * *'  # 16:20 JST → 目標 17:00 JST
    - cron: '20  8 * * *'  # 17:20 JST → 目標 18:00 JST
    - cron: '20  9 * * *'  # 18:20 JST → 目標 19:00 JST
    - cron: '20 10 * * *'  # 19:20 JST → 目標 20:00 JST
  workflow_dispatch:  # 手動実行ボタン（テスト用）

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # docs/data/news.json をコミット・プッシュするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: ニュース取得 → LINE 送信 → JSON 保存
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          NEWS_DATA_PATH: docs/data/news.json
          TZ: Asia/Tokyo
        run: python news_to_line.py

      - name: news.json をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/news.json
          git diff --cached --quiet && echo "変更なし。スキップ。" && exit 0
          git commit -m "chore: update news.json [skip ci]"
          # リモートの変更を取り込んでから push（競合対策）
          git pull --rebase origin main
          git push origin main
